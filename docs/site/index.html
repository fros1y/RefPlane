<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underpaint — Reference Prep for Painters &amp; Artists</title>
    <style>
        :root {
            --bg: #0e0e10;
            --card: #1a1a1e;
            --text: #e8e8ec;
            --muted: #8e8e93;
            --accent: #5e9eff;
            --border: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }
        .container { max-width: 520px; width: 100%; text-align: center; }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            color: var(--muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }
        .description {
            color: var(--muted);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            line-height: 1.7;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }
        .links a {
            display: block;
            padding: 0.85rem 1.25rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: background 0.15s;
        }
        .links a:hover { background: #222226; }
        .footer {
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: auto;
            padding-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎨</div>
        <h1>Underpaint</h1>
        <p class="subtitle">Reference Prep for Painters &amp; Artists</p>
        <p class="description">
            Tonal studies, value maps, color breakdowns, depth effects, surface contours, and physically accurate paint recipes — all processed on your device.
        </p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="support.html">Support</a>
            <!-- <a href="https://apps.apple.com/app/underpaint/idXXXXXXXXXX">Download on the App Store</a> -->
        </div>
    </div>
    <p class="footer">&copy; 2026 Martin Galese. All rights reserved.</p>
</body>
</html>
